<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Labo3</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Game Labo3</h1>

<div id="panel-config">

  <div class="fila">
    <span>Tamaño tablero:</span>
    <input type="number" id="input-tam" min="5" max="50" value="10">
    <span >5 – 50</span> 
  </div>

  <div class="fila">
    <span>Tu color:</span>
    <button class="color-btn azul" onclick="elegirColor('azul')"> Azul</button>
    <button class="color-btn rosa" onclick="elegirColor('rosa')"> Rosa</button>
  </div>

  <div class="btns">
    <button class="accion" id="btn-iniciar" onclick="iniciarJuego()" disabled>Iniciar</button>
    <button class="accion" id="btn-finalizar" onclick="finalizarJuego()" disabled>Finalizar</button>
  </div>

</div>

<div id="info-juego"></div>
<div id="mensaje-fin"></div>

<div id="tablero-wrap"> 
  <div id="tablero"></div>
</div>

<script src="script.js"></script>
</body>
</html>
